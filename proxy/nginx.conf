server {
    listen 80;

    # API — proxy to backend
    location /api/ {
        proxy_pass         http://fileflow-backend:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Everything else — proxy to frontend (serve handles SPA routing)
    location / {
        proxy_pass         http://fileflow-frontend:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
